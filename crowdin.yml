project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: .
base_url: "https://api.crowdin.com"
preserve_hierarchy: true
commit_message: "i18n(%two_letters_code%): New translations {fileName} from Crowdin"
append_commit_message: false

files:
  - source: "source/about/*.md"
    translation: "/source/%two_letters_code%/about/%original_file_name%"
    update_option: update_as_unapproved
    type: fm_md

  - source: "source/api/*.md"
    translation: "/source/%two_letters_code%/api/%original_file_name%"
    update_option: update_as_unapproved
    type: fm_md

  - source: "source/docs/*.md"
    translation: "/source/%two_letters_code%/docs/%original_file_name%"
    update_option: update_as_unapproved
    type: fm_md

  - source: "source/*.md"
    translation: "/source/%two_letters_code%/%original_file_name%"
    update_option: update_as_unapproved
    type: fm_md
