name: Crowdin PR

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # Every day 0 o'clock

jobs:
  pull:
    name: Synchronize with Crowdin
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 1 # Should be 1 to avoid parallel builds
      matrix:
        lc: [ko, pt-BR, ru, th, zh-CN, zh-TW] # Target languages https://developer.crowdin.com/language-codes/
    steps:
      - uses: actions/checkout@v3

      - uses: crowdin/github-action@v1
        name: crowdin - ${{ matrix.lc }}
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          #   commit_message: "l10n(${{ matrix.lc }}): New Crowdin translations"
          localization_branch_name: l10n_master_${{ matrix.lc }}
          pull_request_base_branch_name: master
          pull_request_title: "l10n(${{ matrix.lc }}): New Crowdin translations"
          download_language: ${{ matrix.lc }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
