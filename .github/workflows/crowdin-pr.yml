name: Crowdin PR

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # Every day 0 o'clock

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  pull:
    name: Synchronize with Crowdin
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1 # Should be 1 to avoid parallel builds
      matrix:
        lc: [zh-CN] # Target languages https://developer.crowdin.com/language-codes/
        # lc: [ko, pt-BR, ru, th, zh-CN, zh-TW] # Target languages https://developer.crowdin.com/language-codes/
    steps:
      - uses: actions/checkout@v3

      - run: |
          git config user.name HexoOrgBot
          git config user.email 27251540+HexoOrgBot@users.noreply.github.com

      - uses: crowdin/github-action@v1
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          commit_message: "l10n(${{ matrix.lc }}): New Crowdin translations"
          localization_branch_name: l10n_${{ github.ref_name }}_${{ matrix.lc }}
          pull_request_base_branch_name: ${{ github.ref_name }}
          pull_request_title: "l10n(${{ matrix.lc }}): New Crowdin translations"
          create_pull_request: true
          download_language: ${{ matrix.lc }}
          crowdin_branch_name: ${{ github.ref_name }}
          github_user_name: HexoOrgBot
          github_user_email: 27251540+HexoOrgBot@users.noreply.github.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
